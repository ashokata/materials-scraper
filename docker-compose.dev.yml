version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: materials-db-dev
    environment:
      POSTGRES_DB: materials
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper_dev_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

volumes:
  postgres_data_dev:
